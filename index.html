<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111827">
  <title>Hacienda PA Tasks</title>
  <script>
    try {
      if (localStorage.getItem("rbsb-pa-theme") === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    } catch (error) {}
  </script>
  <link rel="stylesheet" href="./styles.css?v=20260620-3">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">Hacienda</p>
        <h1>PA Tasks</h1>
        <p id="dateLine" class="date-line">Cargando...</p>
      </div>
      <div class="top-actions">
        <button id="themeBtn" class="theme-btn" type="button" aria-label="Cambiar a modo oscuro">Dark</button>
        <button id="refreshBtn" class="icon-btn" type="button" aria-label="Actualizar" title="Actualizar">↻</button>
      </div>
    </header>

    <section class="operator-panel">
      <button id="paButton" class="pa-button" type="button">
        <span class="pa-label">PA activo</span>
        <strong id="currentPa">Seleccionar nombre</strong>
      </button>
      <div id="syncState" class="sync-pill local">Local</div>
    </section>

    <main>
      <section class="quick-add">
        <form id="addTaskForm">
          <label for="newTaskTitle">Nuevo pendiente</label>
          <div class="quick-add-row">
            <input id="newTaskTitle" type="text" autocomplete="off" placeholder="Escribe el pendiente">
            <button type="submit">Agregar</button>
          </div>
          <select id="newTaskArea" aria-label="Área">
            <option value="General">General</option>
            <option value="Control Room">Control Room</option>
            <option value="Driveway">Driveway</option>
            <option value="Production Office">Production Office</option>
            <option value="Catering">Catering</option>
            <option value="Audio Garage">Audio Garage</option>
          </select>
        </form>
      </section>

      <section class="view-tabs" aria-label="Listas">
        <button class="tab-btn active" type="button" data-filter="pending">
          <span id="pendingCount">0</span>
          Pendientes
        </button>
        <button class="tab-btn" type="button" data-filter="active">
          <span id="activeCount">0</span>
          En proceso
        </button>
        <button class="tab-btn" type="button" data-filter="done">
          <span id="doneCount">0</span>
          Terminadas
        </button>
      </section>

      <section id="taskList" class="task-list" aria-live="polite"></section>

      <section id="managerPanel" class="manager-panel" hidden>
        <div class="manager-head">
          <div>
            <p class="eyebrow">Abraham Soto</p>
            <h2>Resultados de hoy</h2>
          </div>
          <button id="managerCloseBtn" class="plain-btn" type="button">Cerrar</button>
        </div>
        <div id="managerContent"></div>
      </section>
    </main>
  </div>

  <div id="paModal" class="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="paModalTitle">
      <div class="modal-head">
        <h2 id="paModalTitle">Escoge tu nombre</h2>
        <button id="paModalClose" class="plain-btn" type="button" data-close-modal="paModal">Cerrar</button>
      </div>
      <div id="paList" class="pa-list"></div>
    </div>
  </div>

  <div id="managerModal" class="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="managerModalTitle">
      <div class="modal-head">
        <h2 id="managerModalTitle">Clave Abraham Soto</h2>
        <button class="plain-btn" type="button" data-close-modal="managerModal">Cerrar</button>
      </div>
      <form id="managerForm">
        <label for="managerPin">Clave</label>
        <input id="managerPin" type="password" inputmode="numeric" autocomplete="off" placeholder="Clave">
        <p id="managerError" class="form-error" hidden>Clave incorrecta.</p>
        <div class="modal-actions">
          <button type="submit">Entrar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./supabase-config.js?v=20260618-1"></script>
  <script src="./app.js?v=20260620-3"></script>
  <script>
    (function () {
      var key = "rbsb-pa-theme";
      var button = document.getElementById("themeBtn");
      var meta = document.querySelector('meta[name="theme-color"]');

      function applyTheme(theme) {
        var isDark = theme === "dark";
        document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
        if (meta) meta.setAttribute("content", isDark ? "#0d1117" : "#111827");
        if (button) {
          button.textContent = isDark ? "Light" : "Dark";
          button.setAttribute("aria-label", isDark ? "Cambiar a modo claro" : "Cambiar a modo oscuro");
        }
      }

      function readTheme() {
        try {
          return localStorage.getItem(key) || "light";
        } catch (error) {
          return "light";
        }
      }

      function writeTheme(theme) {
        try {
          localStorage.setItem(key, theme);
        } catch (error) {}
      }

      applyTheme(readTheme());
      if (button) {
        button.addEventListener("click", function () {
          var next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
          writeTheme(next);
          applyTheme(next);
        });
      }
    })();
  </script>
</body>
</html>
